<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://www.candyicons.com/style-image-examples/abstract-uYcg0JhhxK7bQ54KOtzsLX9U.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/591a850b5f.js" crossorigin="anonymous"></script>
    <title>Pulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="main-background m-0">
        <div class="container-fluid p-0 m-0">
            <div class="row">
                <div class="col-lg-2 d-none d-lg-block">
                    <div class="sidebar-background">
                        <aside>
                            <div class="logo d-flex">
                                <i class="fa-solid fa-headphones logo-icon"></i>
                                 <h3 class ="logo-name">Echo</h3>
                            </div>
                            <hr/>
                             <nav class="sidebar-nav">
                                <button class="nav-items active " onclick="showSection('home', this)"><i class="fa-regular fa-house nav-items-icons"></i>Home</span></button>
                                <button class="nav-items " onclick="showSection('explore', this)"><i class="fa-regular fa-compass nav-items-icons"></i><span class="sidebar-label">Explore</span></button>
                                <button class="nav-items " onclick="showSection('library', this)"><i class="fa-solid fa-book nav-items-icons"></i><span class="sidebar-label">Library</span></button>
                                <button class="nav-items " onclick="showSection('settings', this)"><i class="fa-solid fa-gear nav-items-icons"></i><span class="sidebar-label">Settings</span></button>
                             </nav>
                        </aside>
                    </div>
                </div>
            <main class="col-10">
                        <div class="col-11" >
                            <section class="page" id="home">
                            <div class="hero-card">
                                <p class="hero-tag"><span class="loader"></span>Daily Mix</p>
                                <h1 class="hero-heading">The Daily Tech</h1>
                                <p class="hero-paragraph">Sarah Chen</p>
                                <p class="hero-paragraph">Your daily of technology news, trends , and insights from silicon <br/>valley and beyond</p>
                                <button class="hero-btn-1"><i class="fa-solid fa-play btn-icon"></i>ListenNow</button>
                                <button class="hero-btn-2">ViewShow</button>
                            </div>
                             </section>
                             <section class="page" id="explore">
                                
                             </section>

                             <section class="page" id="library">
                                
                             </section>

                             <section class="page" id="settings">
                                
                             </section>

            </main>
                        <div class="col-12 d-block d-lg-none d-xl-none">
                            <nav class="sidebar-nav d-flex bottom-line bottom-nav">
                                        <button class="nav-item active d-flex flex-column align-items-center" onclick="showSection('home', this)"><i class="fa-regular fa-house nav-items-icons text-center"></i>Home</span></button>
                                        <button class="nav-item d-flex flex-column align-items-center" onclick="showSection('explore', this)"><i class="fa-regular fa-compass nav-items-icons"></i><span class="sidebar-label">Explore</span></button>
                                        <button class="nav-item d-flex flex-column align-items-center" onclick="showSection('library', this)"><i class="fa-solid fa-book nav-items-icons"></i><span class="sidebar-label">Library</span></button>
                                        <button class="nav-item d-flex flex-column align-items-center" onclick="showSection('settings', this)"><i class="fa-solid fa-gear nav-items-icons"></i><span class="sidebar-label">Settings</span></button>
                                    </nav>
                        </div>
                        <div class="col-12">
                        <footer class="bottom-line">
                            <p class="description-in-footer">Select an episode to start listening</p>
                        </footer>
                        </div>
                </div>  
              </div>
           </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>
        function showSection(id, button) {

    // Hide all sections
    document.querySelectorAll(".page").forEach(page => {
        page.style.display = "none";
    });

    // Show selected section
    document.getElementById(id).style.display = "block";

    // Remove active class from all buttons
    document.querySelectorAll(".nav-items").forEach(btn => {
        btn.classList.remove("active");
    });
    document.querySelectorAll(".nav-item").forEach(btn => {
        btn.classList.remove("active");
    });

    // Highlight clicked button
    button.classList.add("active");
}
        </script> 
  </body>
</html>
